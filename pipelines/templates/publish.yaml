parameters:
  - name: modulePath
    type: string
  - name: moduleName
    type: string
  - name: moduleVersion
    type: string
  - name: acrName
    type: string
  - name: azureServiceConnection
    type: string

steps:
  - task: AzureCLI@2
    displayName: 'Publish ${{ parameters.moduleName }}:${{ parameters.moduleVersion }}'
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: scriptPath
      scriptPath: scripts/publish.sh
      arguments: '${{ parameters.modulePath }} ${{ parameters.moduleName }} ${{ parameters.moduleVersion }} ${{ parameters.acrName }}'
