parameters:
  - name: changedModules
    type: string
  - name: acrName
    type: string
  - name: azureServiceConnection
    type: string

steps:
  - task: AzureCLI@2
    displayName: Publish changed modules to ACR
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        # Debug: verify script file is clean
        echo "=== Script file diagnostics ==="
        first_bytes="$(xxd -l 4 scripts/publish.sh | head -1)"
        line_ending_check="$(file scripts/publish.sh)"
        echo "  scripts/publish.sh -> $line_ending_check"
        echo "  First 4 bytes: $first_bytes"
        echo "==============================="

        modules_json=$(cat <<'MODULES_JSON_EOF'
        ${{ parameters.changedModules }}
        MODULES_JSON_EOF
        )

        acr_name='${{ parameters.acrName }}'

        module_count="$(echo "$modules_json" | jq 'length')"
        echo "Modules to publish: $module_count"
        echo "Target ACR: $acr_name"

        if [[ "$module_count" -eq 0 ]]; then
          echo "No modules to publish."
          exit 0
        fi

        published=0
        failed=0
        while IFS= read -r module; do
          module_name="$(echo "$module" | jq -r '.name')"
          module_version="$(echo "$module" | jq -r '.version')"
          module_path="$(echo "$module" | jq -r '.path')"

          echo ""
          echo "========== Publishing: $module_name v$module_version =========="
          echo "  Source : $module_path/main.bicep"
          echo "  Target : br:${acr_name}.azurecr.io/bicep/modules/${module_name}:${module_version}"

          if bash scripts/publish.sh "$module_path" "$module_name" "$module_version" "$acr_name"; then
            echo "[PASS] Published: $module_name:$module_version"
            published=$((published + 1))
          else
            echo "[FAIL] Failed to publish: $module_name:$module_version"
            failed=$((failed + 1))
          fi
        done < <(echo "$modules_json" | jq -c '.[]')

        echo ""
        echo "=== Publish Summary ==="
        echo "  Published : $published"
        echo "  Failed    : $failed"
        echo "  Total     : $module_count"

        if [[ "$failed" -gt 0 ]]; then
          echo "One or more modules failed to publish."
          exit 1
        else
          echo "All $module_count modules published successfully."
        fi
