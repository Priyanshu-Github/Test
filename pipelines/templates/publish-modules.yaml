parameters:
  - name: changedModules
    type: string
  - name: acrName
    type: string
  - name: azureServiceConnection
    type: string

steps:
  - task: AzureCLI@2
    displayName: Publish changed modules to ACR
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        modules_json=$(cat <<'MODULES_JSON_EOF'
        ${{ parameters.changedModules }}
        MODULES_JSON_EOF
        )

        acr_name='${{ parameters.acrName }}'

        module_count="$(echo "$modules_json" | jq 'length')"
        if [[ "$module_count" -eq 0 ]]; then
          echo "No modules to publish."
          exit 0
        fi

        while IFS= read -r module; do
          module_name="$(echo "$module" | jq -r '.name')"
          module_version="$(echo "$module" | jq -r '.version')"
          module_path="$(echo "$module" | jq -r '.path')"

          echo "========== Publishing: $module_name v$module_version =========="
          bash scripts/publish.sh "$module_path" "$module_name" "$module_version" "$acr_name"
        done < <(echo "$modules_json" | jq -c '.[]')
