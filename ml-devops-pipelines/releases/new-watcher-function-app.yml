# CD Pipeline — new-watcher-function-app
#
# Thin wrapper. All logic lives in templates/stages/release-app.yml.
# To onboard a new app, copy this file and update the values below.

trigger: none

pr: none

resources:
  repositories:
    - repository: app-repo
      type: git
      name: 'ML Platform/new-watcher-function-app'
      # TODO: Change back to ref: release after testing
      ref: new-ci-templates
  pipelines:
    - pipeline: ci-build
      # TODO: Update to final pipeline name once standardized
      source: 'new-watcher-function-app - Priyanshu'
      trigger: none

variables:
  - name: bicepFile
    value: 'new-watcher-function-app/infra/main.bicep'
  - name: paramBasePath
    value: 'new-watcher-function-app/infra/params'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - template: ../templates/stages/release-app.yml
    parameters:
      appName: 'new-watcher-function-app'
      appType: 'function'
      planType: 'flex-consumption'
      bicepFile: $(bicepFile)
      qaParamFile: '$(paramBasePath)/qa.bicepparam'
      uatParamFile: '$(paramBasePath)/uat.bicepparam'
      prodParamFile: '$(paramBasePath)/prod.bicepparam'

      # QA — auto-deploy (no approval gate)
      # TODO: Replace with sc-infra-qa for production use
      qaServiceConnection: 'nexworks-devops-nonprod-cus'
      qaResourceGroup: 'qa-Edison-ml'
      qaAppResourceName: 'func-new-watcher-qa'

      # UAT — manual approval via Azure DevOps Environment
      # TODO: Update with real UAT values
      uatServiceConnection: 'nexworks-devops-nonprod-cus'
      uatResourceGroup: 'qa-Edison-ml'
      uatAppResourceName: 'func-new-watcher-qa'

      # Prod — manual approval via Azure DevOps Environment
      # TODO: Update with real Prod values
      prodServiceConnection: 'nexworks-devops-nonprod-cus'
      prodResourceGroup: 'qa-Edison-ml'
      prodAppResourceName: 'func-new-watcher-qa'
