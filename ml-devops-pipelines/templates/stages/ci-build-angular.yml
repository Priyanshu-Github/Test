# CI Build Template — Angular Web Apps (App Service Linux)
#
# Design:
#   1. Fully parameterized (appName, nodeVersion, angularProjectName, buildScript)
#   2. Designed for use with `extends` (security boundary — devs can't inject steps)
#   3. Linting is non-blocking (existing codebase is rough; will be tightened later)
#   4. No unit tests (intentional — see CLAUDE.md / org policy)
#   5. Security scan on dependencies (npm audit, warning only)
#   6. Build metadata stamped into artifact for traceability
#   7. Build-once philosophy — same artifact flows QA → UAT → Prod (default buildScript: build:production)
#   8. Explicit dist contract — flat Angular output only (dist/<project>).
#      No auto-detection: silent layout drift would mask broken builds.
#   9. Artifact contract validated before publish (required files, file sizes, JS bundle count)
#  10. Artifact published as build artifact named 'drop' (matches function-app template)

parameters:
  - name: appName
    type: string
  - name: nodeVersion
    # Angular 20 requires Node ^20.19.0 || ^22.12.0. Default holds the 20.x LTS line.
    type: string
    default: '20.19.x'
  - name: angularProjectName
    # Must match the project name in angular.json.
    # Dist path contract is fixed: dist/<angularProjectName>
    type: string
  - name: buildScript
    # npm script to invoke. Defaults to build:production (build-once principle).
    # Override per app only if env-specific bundling is unavoidable.
    type: string
    default: 'build:production'
  - name: enableLinting
    type: boolean
    default: true
  - name: enableSecurityScan
    type: boolean
    default: true

stages:
  - stage: Build
    displayName: 'Build — ${{ parameters.appName }}'
    jobs:
      - job: Build
        displayName: 'Build Angular Web App'
        pool:
          vmImage: 'ubuntu-latest'
        variables:
          buildId: $(Build.BuildId)
          srcDir: $(Build.SourcesDirectory)
          workDir: $(System.DefaultWorkingDirectory)
          commitSha: $(Build.SourceVersion)
          branchName: $(Build.SourceBranchName)
          npmCacheFolder: $(Pipeline.Workspace)/.npm
          distDir: $(Build.SourcesDirectory)/dist/${{ parameters.angularProjectName }}
        steps:
          - checkout: self

          - task: Cache@2
            displayName: 'Cache npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | "${{ parameters.nodeVersion }}" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)" | "${{ parameters.nodeVersion }}"
                npm | "$(Agent.OS)"
              path: $(npmCacheFolder)

          - task: UseNode@1
            displayName: 'Set Node Version to ${{ parameters.nodeVersion }}'
            inputs:
              version: ${{ parameters.nodeVersion }}

          - bash: |
              echo "Build contract:"
              echo "  angularProjectName: ${{ parameters.angularProjectName }}"
              echo "  expected distDir:   $(distDir)"
            displayName: 'Print Build Contract'

          - bash: |
              npm config set cache "$(npmCacheFolder)" --location=project
              npm ci --prefer-offline --no-audit --no-fund
            displayName: 'Install Dependencies (npm ci)'

          - ${{ if parameters.enableLinting }}:
            - bash: |
                if npm run | grep -qE '^\s+lint$'; then
                  echo "Running lint (non-blocking)..."
                  npm run lint
                else
                  echo "##vso[task.logissue type=warning]No 'lint' script defined in package.json — skipping."
                fi
              displayName: 'Lint (non-blocking)'
              continueOnError: true

          - ${{ if parameters.enableSecurityScan }}:
            - bash: |
                echo "Scanning dependencies for known vulnerabilities (high+)..."
                npm audit --audit-level=high || true
                echo "##vso[task.logissue type=warning]Dependency vulnerabilities may exist — review pipeline logs. Build will continue."
              displayName: 'Security Scan — Dependencies (warning only)'

          - bash: |
              npm run ${{ parameters.buildScript }}
            displayName: 'Build (${{ parameters.buildScript }})'

          - bash: |
              set -e
              if [ ! -d "$(distDir)" ]; then
                DIST_ROOT="$(Build.SourcesDirectory)/dist/${{ parameters.angularProjectName }}"
                echo "##vso[task.logissue type=error]Expected dist folder not found at: $(distDir)"
                echo ""
                echo "=== Diagnostics ==="
                echo "  angularProjectName param: ${{ parameters.angularProjectName }}"
                echo ""
                echo "=== Contents of dist/ ==="
                ls -la "$(Build.SourcesDirectory)/dist/" 2>/dev/null || echo "  (no dist/ folder produced)"
                echo ""
                echo "=== Dist project folders ==="
                ls -1 "$(Build.SourcesDirectory)/dist/" 2>/dev/null || true
                if [ -d "${DIST_ROOT}/browser" ]; then
                  echo ""
                  echo "Detected nested browser folder: ${DIST_ROOT}/browser"
                  echo "Flat contract expects output at: ${DIST_ROOT}"
                  echo "If browser output is intentional, update the shared template contract."
                fi
                echo ""
                echo "=== Resolution ==="
                echo "  Confirm angular.json outputPath targets flat layout: dist/${{ parameters.angularProjectName }}"
                exit 1
              fi
              echo "{\"appName\": \"${{ parameters.appName }}\", \"buildId\": \"$(buildId)\", \"commitSha\": \"$(commitSha)\", \"branch\": \"$(branchName)\", \"nodeVersion\": \"${{ parameters.nodeVersion }}\", \"buildScript\": \"${{ parameters.buildScript }}\", \"buildDate\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > "$(distDir)/build-info.json"
              echo "Build metadata stamped at $(distDir)/build-info.json"
              cat "$(distDir)/build-info.json"
            displayName: 'Stamp Build Metadata'

          - bash: |
              set -e
              echo "Verifying artifact contract at: $(distDir)"

              # Required: index.html must exist
              if [ ! -f "$(distDir)/index.html" ]; then
                echo "##vso[task.logissue type=error]Missing required file: index.html"
                exit 1
              fi

              # Required: index.html non-trivial (Angular's index is typically >500 bytes)
              INDEX_SIZE=$(stat -c%s "$(distDir)/index.html" 2>/dev/null || stat -f%z "$(distDir)/index.html")
              if [ "$INDEX_SIZE" -lt 500 ]; then
                echo "##vso[task.logissue type=error]index.html is suspiciously small (${INDEX_SIZE} bytes) — build may be incomplete"
                exit 1
              fi

              # Required: at least 2 JS bundles (main + polyfills/runtime is the minimum)
              JS_COUNT=$(find "$(distDir)" -maxdepth 1 -name "*.js" -type f | wc -l | tr -d ' ')
              if [ "$JS_COUNT" -lt 2 ]; then
                echo "##vso[task.logissue type=error]Expected ≥2 JS bundles in $(distDir), found ${JS_COUNT}"
                ls -la "$(distDir)" || true
                exit 1
              fi

              # Required: build-info.json stamped in previous step
              if [ ! -f "$(distDir)/build-info.json" ]; then
                echo "##vso[task.logissue type=error]Missing build-info.json — Stamp Build Metadata step did not produce it"
                exit 1
              fi

              echo "Contract verified:"
              echo "  index.html:        ${INDEX_SIZE} bytes"
              echo "  JS bundles:        ${JS_COUNT}"
              echo "  build-info.json:   present"
            displayName: 'Verify Artifact Contract'

          - task: ArchiveFiles@2
            displayName: 'Create Zip File'
            inputs:
              rootFolderOrFile: $(distDir)
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(workDir)/builds/${{ parameters.appName }}-$(buildId).zip'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifact'
            inputs:
              PathtoPublish: '$(workDir)/builds/${{ parameters.appName }}-$(buildId).zip'
              artifactName: 'drop'
