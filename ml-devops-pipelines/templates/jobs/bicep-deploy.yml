parameters:
  - name: appName
    type: string
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: resourceGroup
    type: string
  - name: bicepFile
    type: string
  - name: paramFile
    type: string
  - name: extraRepos
    type: object
    default: []
  - name: enableDebug
    type: boolean
    default: false

jobs:
  - job: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_${{ parameters.environment }}
    displayName: 'Deploy Infra — ${{ parameters.appName }} (${{ parameters.environment }})'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      buildId: $(Build.BuildId)
    steps:
      - checkout: self
      - ${{ each repo in parameters.extraRepos }}:
        - checkout: ${{ repo }}

      - ${{ if parameters.enableDebug }}:
        - task: AzureCLI@2
          displayName: 'Debug — Verify parameters and dependencies'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -e
              echo "=== Param file contents ==="
              cat ${{ parameters.paramFile }}
              echo ""
              echo "=== App Service Plans in ${{ parameters.resourceGroup }} ==="
              az appservice plan list \
                --resource-group ${{ parameters.resourceGroup }} \
                --query "[].{name:name, id:id, sku:sku.name}" -o table
              echo ""
              echo "=== Storage Accounts in ${{ parameters.resourceGroup }} ==="
              az storage account list \
                --resource-group ${{ parameters.resourceGroup }} \
                --query "[].{name:name, id:id}" -o table

      - task: AzureCLI@2
        displayName: 'Restore Bicep Modules'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az bicep restore --file ${{ parameters.bicepFile }}

      - task: AzureCLI@2
        displayName: 'Deploy Bicep to ${{ parameters.environment }}'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az deployment group create \
              --resource-group ${{ parameters.resourceGroup }} \
              --template-file ${{ parameters.bicepFile }} \
              --parameters ${{ parameters.paramFile }} \
              --name "${{ parameters.appName }}-$(buildId)" \
              --verbose
        name: deployBicep

      - task: AzureCLI@2
        displayName: 'Capture Deployment Outputs'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            OUTPUTS=$(az deployment group show \
              --resource-group ${{ parameters.resourceGroup }} \
              --name "${{ parameters.appName }}-$(buildId)" \
              --query properties.outputs -o json)
            echo "##vso[task.setvariable variable=deploymentOutputs;isOutput=true]$OUTPUTS"
        name: outputs

      - task: AzureCLI@2
        displayName: 'Verify UAMI Role Assignments'
        condition: succeeded()
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e

            OUTPUTS=$(az deployment group show \
              --resource-group ${{ parameters.resourceGroup }} \
              --name "${{ parameters.appName }}-$(buildId)" \
              --query properties.outputs -o json)

            # Extract any output key containing "principalId" (UAMI principal IDs)
            PRINCIPAL_IDS=$(echo "$OUTPUTS" | jq -r 'to_entries[] | select(.key | test("[Pp]rincipal[Ii]d")) | .value.value' 2>/dev/null || echo "")

            if [ -z "$PRINCIPAL_IDS" ]; then
              echo "No managed identity principalId outputs found in deployment. Skipping verification."
              exit 0
            fi

            for PID in $PRINCIPAL_IDS; do
              echo ""
              echo "=== Role assignments for principalId: $PID ==="
              ASSIGNMENTS=$(az role assignment list \
                --assignee-object-id "$PID" \
                --assignee-principal-type ServicePrincipal \
                --all \
                --query "[].{role:roleDefinitionName, scope:scope}" \
                -o table 2>/dev/null || echo "")

              if [ -z "$ASSIGNMENTS" ] || [ "$(echo "$ASSIGNMENTS" | wc -l)" -lt 3 ]; then
                echo "##vso[task.logissue type=warning]No role assignments found for principalId $PID. Bicep role assignments may have failed to apply."
                echo "Listing role assignment resources from deployment..."
                az deployment group show \
                  --resource-group ${{ parameters.resourceGroup }} \
                  --name "${{ parameters.appName }}-$(buildId)" \
                  --query "properties.outputResources[?contains(id, 'Microsoft.Authorization/roleAssignments')].id" \
                  -o tsv
              else
                echo "$ASSIGNMENTS"
              fi
            done
        name: verifyRoles
