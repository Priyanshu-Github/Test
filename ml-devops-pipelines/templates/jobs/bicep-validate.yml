parameters:
  - name: appName
    type: string
  - name: serviceConnection
    type: string
  - name: resourceGroup
    type: string
  - name: bicepFile
    type: string
  - name: paramFile
    type: string
  - name: acrName
    type: string
    default: 'qaedisonmoduleregistry'
  - name: extraRepos
    type: object
    default: []
  - name: enableDebug
    type: boolean
    default: false

jobs:
  - job: Validate_${{ replace(parameters.appName, '-', '_') }}
    displayName: 'Validate Bicep — ${{ parameters.appName }}'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: self
      - ${{ each repo in parameters.extraRepos }}:
        - checkout: ${{ repo }}

      - bash: |
          echo "=== Debug: Path Resolution ==="
          echo "Working directory:        $(pwd)"
          echo "Build.SourcesDirectory:   $(Build.SourcesDirectory)"
          echo "Build.Repository.Name:    $(Build.Repository.Name)"
          echo "System.DefaultWorkingDirectory: $(System.DefaultWorkingDirectory)"
          echo "Pipeline.Workspace:       $(Pipeline.Workspace)"
          echo ""
          echo "=== bicepFile param value: ${{ parameters.bicepFile }} ==="
          echo ""
          echo "=== Top-level directory listing ==="
          ls -la "$(Build.SourcesDirectory)/"
          echo ""
          echo "=== Recursive listing (2 levels) ==="
          find "$(Build.SourcesDirectory)" -maxdepth 3 -type f -name "*.bicep" 2>/dev/null || echo "No .bicep files found"
        displayName: 'Debug — Directory structure after checkout'

      - bash: |
          set -e
          echo "=== Verify bicep file exists ==="
          if [ ! -f "${{ parameters.bicepFile }}" ]; then
            echo "##vso[task.logissue type=error]Bicep file not found: ${{ parameters.bicepFile }}"
            exit 1
          fi
          echo "Found: ${{ parameters.bicepFile }}"

          echo "=== Verify param file exists ==="
          if [ ! -f "${{ parameters.paramFile }}" ]; then
            echo "##vso[task.logissue type=error]Param file not found: ${{ parameters.paramFile }}"
            exit 1
          fi
          echo "Found: ${{ parameters.paramFile }}"

          echo "=== Verify bicepconfig.json exists (Bicep walks up directory tree) ==="
          SEARCH_DIR="$(cd "$(dirname "${{ parameters.bicepFile }}")" && pwd)"
          FOUND_CONFIG=""
          while [ "$SEARCH_DIR" != "/" ]; do
            if [ -f "$SEARCH_DIR/bicepconfig.json" ]; then
              FOUND_CONFIG="$SEARCH_DIR/bicepconfig.json"
              break
            fi
            SEARCH_DIR="$(dirname "$SEARCH_DIR")"
          done
          if [ -z "$FOUND_CONFIG" ]; then
            echo "##vso[task.logissue type=error]bicepconfig.json not found in any parent directory of ${{ parameters.bicepFile }} — module aliases will not resolve"
            exit 1
          fi
          echo "Found: $FOUND_CONFIG"
        displayName: 'Verify file paths'

      - ${{ if parameters.enableDebug }}:
        - bash: |
            set -e
            echo "=== Repo directories ==="
            ls -la "$(Build.SourcesDirectory)/"
            echo ""
            echo "=== bicepconfig.json contents ==="
            cat "$(dirname "${{ parameters.bicepFile }}")/bicepconfig.json"
          displayName: 'Debug — Dump checkout details'

      - task: AzureCLI@2
        displayName: 'Verify ACR connectivity'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az acr show --name ${{ parameters.acrName }} --query "loginServer" -o tsv

      - task: AzureCLI@2
        displayName: 'Restore Bicep Modules'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az bicep restore --file ${{ parameters.bicepFile }}

      - task: AzureCLI@2
        displayName: 'Bicep Build (compile)'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az bicep build --file ${{ parameters.bicepFile }}

      - task: AzureCLI@2
        displayName: 'Bicep Lint'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az bicep lint --file ${{ parameters.bicepFile }}

      - task: AzureCLI@2
        displayName: 'Preflight Validation'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az deployment group validate \
              --resource-group ${{ parameters.resourceGroup }} \
              --template-file ${{ parameters.bicepFile }} \
              --parameters ${{ parameters.paramFile }}
