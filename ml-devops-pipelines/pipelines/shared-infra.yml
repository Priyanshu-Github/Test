# Shared Infrastructure Pipeline
#
# Deploys shared resources (VNet, shared storage, etc.) through environments.
# Triggered when shared/ folder changes. Shared infra Bicep lives in THIS repo.

trigger:
  branches:
    include:
      - release
  paths:
    include:
      - shared/**

pr:
  branches:
    include:
      - release
  paths:
    include:
      - shared/**

pool:
  vmImage: 'ubuntu-latest'

stages:
  - template: templates/stages/release-shared-infra.yml
    parameters:
      qaServiceConnection: 'sc-infra-qa'
      qaResourceGroup: 'rg-shared-qa'
      uatServiceConnection: 'sc-infra-uat'
      uatResourceGroup: 'rg-shared-uat'
      prodServiceConnection: 'sc-infra-prod'
      prodResourceGroup: 'rg-shared-prod'
