# Shared Infrastructure Pipeline
#
# Deploys shared resources (VNet, shared storage, Key Vault, blob containers)
# and seeds Key Vault with secrets (derived + external).
#
# External secrets flow:
#   Azure DevOps Variable Group → this pipeline → Key Vault
#   Apps read from KV at runtime via @Microsoft.KeyVault(...) references.
#
# Setup required (one-time, per environment):
#   1. Create Variable Group "vg-ml-external-secrets-qa" in Azure DevOps
#      Library with secret variables for each external secret.
#   2. Authorize this pipeline to access the Variable Group.

trigger:
  branches:
    include:
      - release
  paths:
    include:
      - Templates/shared/**

pr:
  branches:
    include:
      - release
  paths:
    include:
      - Templates/shared/**

variables:
  # ─── Paths ───
  - name: bicepFile
    value: 'Templates/shared/main.bicep'
  - name: paramBasePath
    value: 'Templates/shared/params'

  # ─── QA ───
  - name: qaServiceConnection
    value: 'nexworks-devops-nonprod-cus'
  - name: qaResourceGroup
    value: 'qa-Edison-ml'
  - name: qaKeyVaultName
    value: 'kv-dacedisondemotest'

  # ─── UAT ───
  # TODO: Update with real UAT values
  - name: uatServiceConnection
    value: '<UAT_SERVICE_CONNECTION>'
  - name: uatResourceGroup
    value: '<UAT_RESOURCE_GROUP>'

  # ─── Prod ───
  # TODO: Update with real Prod values
  - name: prodServiceConnection
    value: '<PROD_SERVICE_CONNECTION>'
  - name: prodResourceGroup
    value: '<PROD_RESOURCE_GROUP>'

  # ─── Variable Groups (secrets) ───
  - group: vg-ml-external-secrets-qa

pool:
  vmImage: 'ubuntu-latest'

stages:
  - template: templates/stages/release-shared-infra.yml
    parameters:
      bicepFile: $(bicepFile)
      qaParamFile: '$(paramBasePath)/qa.bicepparam'
      uatParamFile: '$(paramBasePath)/uat.bicepparam'
      prodParamFile: '$(paramBasePath)/prod.bicepparam'
      qaServiceConnection: $(qaServiceConnection)
      qaResourceGroup: $(qaResourceGroup)
      uatServiceConnection: $(uatServiceConnection)
      uatResourceGroup: $(uatResourceGroup)
      prodServiceConnection: $(prodServiceConnection)
      prodResourceGroup: $(prodResourceGroup)

      # ─── KV secret seeding (QA) ───
      qaKeyVaultName: $(qaKeyVaultName)
      # Maps Variable Group variables → KV secret names
      # name = KV secret name (hyphens, lowercase)
      # value = Azure DevOps variable macro from variable group
      externalSecrets: []
      # Example pattern for app secrets:
      # externalSecrets:
      #   - name: 'claude-api-key'
      #     value: $(CLAUDE_API_KEY)
      #   - name: 'db-password'
      #     value: $(DB_PASSWORD)
