# Release Template — App Deployment (Function App or App Service)
#
# Flow: Validate → Deploy QA (auto) → What-If UAT → Approve+Deploy UAT
#       → What-If Prod → Approve+Deploy Prod
#
# Bicep files (main.bicep + params/) live in the APP REPO, not here.
# The release pipeline checks out the app repo via resources.repositories.
# App artifact is consumed via pipeline artifacts (resources.pipelines.ci-build).
#
# Usage: Each app gets a thin wrapper in pipelines/releases/ that sets
# resources (app-repo + ci-build) and calls this template with app-specific values.

parameters:
  # ─── App identity ───
  - name: appName
    type: string
  - name: appType
    type: string
    default: 'function'
    values:
      - 'function'
      - 'appservice'

  # Flex Consumption requires a different deployment method (OneDeploy via config-zip).
  # Consumption/Premium/Dedicated plans use the standard zip deploy.
  - name: planType
    type: string
    default: 'consumption'
    values:
      - 'consumption'
      - 'flex-consumption'

  # ─── Shared dependencies preflight (blob owned by app team — disabled) ───
  # - name: dependenciesFile
  #   type: string
  #   default: ''
  # - name: qaStorageAccountName
  #   type: string
  #   default: ''

  # ─── Bicep paths (relative to multi-repo checkout root) ───
  - name: bicepFile
    type: string
  - name: qaParamFile
    type: string
  - name: uatParamFile
    type: string
  - name: prodParamFile
    type: string

  # ─── QA (auto-deploy, no approval) ───
  - name: qaServiceConnection
    type: string
  - name: qaResourceGroup
    type: string
  - name: qaAppResourceName
    type: string

  # ─── UAT (manual approval via Azure DevOps Environment) ───
  - name: uatServiceConnection
    type: string
  - name: uatResourceGroup
    type: string
  - name: uatAppResourceName
    type: string

  # ─── Prod (manual approval via Azure DevOps Environment) ───
  - name: prodServiceConnection
    type: string
  - name: prodResourceGroup
    type: string
  - name: prodAppResourceName
    type: string

stages:
  # ──────────────────────────────────────────
  # Stage 1: Validate (compile + lint + preflight)
  # ──────────────────────────────────────────
  - stage: Validate
    displayName: 'Validate — ${{ parameters.appName }}'
    jobs:
      - template: ../jobs/bicep-validate.yml
        parameters:
          appName: ${{ parameters.appName }}
          serviceConnection: ${{ parameters.qaServiceConnection }}
          resourceGroup: ${{ parameters.qaResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.qaParamFile }}
          extraRepos:
            - app-repo

      # Blob preflight disabled — blob containers owned by app team
      # - ${{ if ne(parameters.dependenciesFile, '') }}:
      #   - template: ../jobs/preflight-check-dependencies.yml
      #     parameters:
      #       appName: ${{ parameters.appName }}
      #       environment: 'qa'
      #       serviceConnection: ${{ parameters.qaServiceConnection }}
      #       storageAccountName: ${{ parameters.qaStorageAccountName }}
      #       dependenciesFile: ${{ parameters.dependenciesFile }}

  # ──────────────────────────────────────────
  # Stage 2: Deploy to QA (auto — no approval)
  # ──────────────────────────────────────────
  - stage: DeployQA
    displayName: 'Deploy QA — ${{ parameters.appName }}'
    dependsOn: Validate
    jobs:
      - job: DebugRoute_${{ replace(parameters.appName, '-', '_') }}_qa
        displayName: 'Debug Route — ${{ parameters.appName }} (qa)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none
          - bash: |
              echo "appName:   ${{ parameters.appName }}"
              echo "appType:   ${{ parameters.appType }}"
              echo "planType:  ${{ parameters.planType }}"
              echo "stage:     DeployQA"
            displayName: 'Print resolved parameters'
          - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'consumption')) }}:
            - bash: echo "Selected deploy template: ../jobs/app-deploy-function.yml"
              displayName: 'Route selected: function zip deploy'
          - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'flex-consumption')) }}:
            - bash: echo "Selected deploy template: ../jobs/app-deploy-function-flex.yml"
              displayName: 'Route selected: function flex deploy'
          - ${{ if and(eq(parameters.appType, 'function'), not(or(eq(parameters.planType, 'consumption'), eq(parameters.planType, 'flex-consumption')))) }}:
            - bash: |
                echo "##vso[task.logissue type=warning]No function deploy template matched for planType='${{ parameters.planType }}'"
              displayName: 'Route selected: none'
          - ${{ if ne(parameters.appType, 'function') }}:
            - bash: echo "No function deploy job expected because appType='${{ parameters.appType }}'"
              displayName: 'Route selected: non-function app'

      - template: ../jobs/bicep-deploy.yml
        parameters:
          appName: ${{ parameters.appName }}
          environment: 'qa'
          serviceConnection: ${{ parameters.qaServiceConnection }}
          resourceGroup: ${{ parameters.qaResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.qaParamFile }}
          extraRepos:
            - app-repo

      - job: DebugGate_${{ replace(parameters.appName, '-', '_') }}_qa
        displayName: 'Debug Gate (qa)'
        dependsOn:
          - DeployInfra_${{ replace(parameters.appName, '-', '_') }}_qa
        condition: always()
        variables:
          infraResult: $[ dependencies.DeployInfra_${{ replace(parameters.appName, '-', '_') }}_qa.result ]
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none
          - bash: |
              echo "dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_qa"
              echo "infraResult: $(infraResult)"
              echo "NOTE: Blank result is a known Azure DevOps limitation for jobs defined in templates."
              echo "Check the DeployInfra job status directly in the pipeline UI."
            displayName: 'Print dependency gate status'

      - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'consumption')) }}:
        - template: ../jobs/app-deploy-function.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'qa'
            serviceConnection: ${{ parameters.qaServiceConnection }}
            functionAppName: ${{ parameters.qaAppResourceName }}
            resourceGroup: ${{ parameters.qaResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_qa

      - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'flex-consumption')) }}:
        - template: ../jobs/app-deploy-function-flex.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'qa'
            serviceConnection: ${{ parameters.qaServiceConnection }}
            functionAppName: ${{ parameters.qaAppResourceName }}
            resourceGroup: ${{ parameters.qaResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_qa

      - ${{ if eq(parameters.appType, 'appservice') }}:
        - template: ../jobs/app-deploy-webapp.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'qa'
            serviceConnection: ${{ parameters.qaServiceConnection }}
            webAppName: ${{ parameters.qaAppResourceName }}
            resourceGroup: ${{ parameters.qaResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_qa

  # ──────────────────────────────────────────
  # Stage 3: What-If UAT (preview changes for approvers)
  # ──────────────────────────────────────────
  - stage: WhatIfUAT
    displayName: 'What-If UAT — ${{ parameters.appName }}'
    dependsOn: DeployQA
    jobs:
      - template: ../jobs/bicep-what-if.yml
        parameters:
          appName: ${{ parameters.appName }}
          environment: 'uat'
          serviceConnection: ${{ parameters.uatServiceConnection }}
          resourceGroup: ${{ parameters.uatResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.uatParamFile }}
          extraRepos:
            - app-repo

  # ──────────────────────────────────────────
  # Stage 4: Deploy to UAT (manual approval)
  # ──────────────────────────────────────────
  - stage: DeployUAT
    displayName: 'Deploy UAT — ${{ parameters.appName }}'
    dependsOn: WhatIfUAT
    jobs:
      - deployment: ApproveUAT
        displayName: 'Approve UAT Deployment'
        environment: 'UAT'
        strategy:
          runOnce:
            deploy:
              steps:
                - bash: echo "UAT deployment approved."

      - job: DebugRoute_${{ replace(parameters.appName, '-', '_') }}_uat
        displayName: 'Debug Route — ${{ parameters.appName }} (uat)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none
          - bash: |
              echo "appName:   ${{ parameters.appName }}"
              echo "appType:   ${{ parameters.appType }}"
              echo "planType:  ${{ parameters.planType }}"
              echo "stage:     DeployUAT"
            displayName: 'Print resolved parameters'
          - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'consumption')) }}:
            - bash: echo "Selected deploy template: ../jobs/app-deploy-function.yml"
              displayName: 'Route selected: function zip deploy'
          - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'flex-consumption')) }}:
            - bash: echo "Selected deploy template: ../jobs/app-deploy-function-flex.yml"
              displayName: 'Route selected: function flex deploy'
          - ${{ if and(eq(parameters.appType, 'function'), not(or(eq(parameters.planType, 'consumption'), eq(parameters.planType, 'flex-consumption')))) }}:
            - bash: |
                echo "##vso[task.logissue type=warning]No function deploy template matched for planType='${{ parameters.planType }}'"
              displayName: 'Route selected: none'
          - ${{ if ne(parameters.appType, 'function') }}:
            - bash: echo "No function deploy job expected because appType='${{ parameters.appType }}'"
              displayName: 'Route selected: non-function app'

      - template: ../jobs/bicep-deploy.yml
        parameters:
          appName: ${{ parameters.appName }}
          environment: 'uat'
          serviceConnection: ${{ parameters.uatServiceConnection }}
          resourceGroup: ${{ parameters.uatResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.uatParamFile }}
          extraRepos:
            - app-repo

      - job: DebugGate_${{ replace(parameters.appName, '-', '_') }}_uat
        displayName: 'Debug Gate — app deploy dependency (uat)'
        dependsOn:
          - DeployInfra_${{ replace(parameters.appName, '-', '_') }}_uat
        condition: always()
        variables:
          infraResult: $[ dependencies.DeployInfra_${{ replace(parameters.appName, '-', '_') }}_uat.result ]
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none
          - bash: |
              RESULT="$(infraResult)"
              echo "dependsOn job: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_uat"
              echo "DeployInfra result: '$RESULT'"
              if [ -z "$RESULT" ]; then
                echo "##vso[task.logissue type=warning]Runtime expression returned blank — Azure DevOps could not resolve dependencies context for template-included job. Check DeployInfra job status directly in the pipeline UI."
              elif [ "$RESULT" == "Succeeded" ]; then
                echo "DeployInfra succeeded. App deploy should proceed."
              else
                echo "##vso[task.logissue type=warning]DeployInfra result is '$RESULT' (not Succeeded). App deploy job uses default succeeded() condition and will be skipped."
              fi
            displayName: 'Print dependency gate status'

      - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'consumption')) }}:
        - template: ../jobs/app-deploy-function.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'uat'
            serviceConnection: ${{ parameters.uatServiceConnection }}
            functionAppName: ${{ parameters.uatAppResourceName }}
            resourceGroup: ${{ parameters.uatResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_uat

      - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'flex-consumption')) }}:
        - template: ../jobs/app-deploy-function-flex.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'uat'
            serviceConnection: ${{ parameters.uatServiceConnection }}
            functionAppName: ${{ parameters.uatAppResourceName }}
            resourceGroup: ${{ parameters.uatResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_uat

      - ${{ if eq(parameters.appType, 'appservice') }}:
        - template: ../jobs/app-deploy-webapp.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'uat'
            serviceConnection: ${{ parameters.uatServiceConnection }}
            webAppName: ${{ parameters.uatAppResourceName }}
            resourceGroup: ${{ parameters.uatResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_uat

  # ──────────────────────────────────────────
  # Stage 5: What-If Prod (preview changes for approvers)
  # ──────────────────────────────────────────
  - stage: WhatIfProd
    displayName: 'What-If Prod — ${{ parameters.appName }}'
    dependsOn: DeployUAT
    jobs:
      - template: ../jobs/bicep-what-if.yml
        parameters:
          appName: ${{ parameters.appName }}
          environment: 'prod'
          serviceConnection: ${{ parameters.prodServiceConnection }}
          resourceGroup: ${{ parameters.prodResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.prodParamFile }}
          extraRepos:
            - app-repo

  # ──────────────────────────────────────────
  # Stage 6: Deploy to Prod (manual approval)
  # ──────────────────────────────────────────
  - stage: DeployProd
    displayName: 'Deploy Prod — ${{ parameters.appName }}'
    dependsOn: WhatIfProd
    jobs:
      - deployment: ApproveProd
        displayName: 'Approve Prod Deployment'
        environment: 'Prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - bash: echo "Production deployment approved."

      - job: DebugRoute_${{ replace(parameters.appName, '-', '_') }}_prod
        displayName: 'Debug Route — ${{ parameters.appName }} (prod)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none
          - bash: |
              echo "appName:   ${{ parameters.appName }}"
              echo "appType:   ${{ parameters.appType }}"
              echo "planType:  ${{ parameters.planType }}"
              echo "stage:     DeployProd"
            displayName: 'Print resolved parameters'
          - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'consumption')) }}:
            - bash: echo "Selected deploy template: ../jobs/app-deploy-function.yml"
              displayName: 'Route selected: function zip deploy'
          - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'flex-consumption')) }}:
            - bash: echo "Selected deploy template: ../jobs/app-deploy-function-flex.yml"
              displayName: 'Route selected: function flex deploy'
          - ${{ if and(eq(parameters.appType, 'function'), not(or(eq(parameters.planType, 'consumption'), eq(parameters.planType, 'flex-consumption')))) }}:
            - bash: |
                echo "##vso[task.logissue type=warning]No function deploy template matched for planType='${{ parameters.planType }}'"
              displayName: 'Route selected: none'
          - ${{ if ne(parameters.appType, 'function') }}:
            - bash: echo "No function deploy job expected because appType='${{ parameters.appType }}'"
              displayName: 'Route selected: non-function app'

      - template: ../jobs/bicep-deploy.yml
        parameters:
          appName: ${{ parameters.appName }}
          environment: 'prod'
          serviceConnection: ${{ parameters.prodServiceConnection }}
          resourceGroup: ${{ parameters.prodResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.prodParamFile }}
          extraRepos:
            - app-repo

      - job: DebugGate_${{ replace(parameters.appName, '-', '_') }}_prod
        displayName: 'Debug Gate — app deploy dependency (prod)'
        dependsOn:
          - DeployInfra_${{ replace(parameters.appName, '-', '_') }}_prod
        condition: always()
        variables:
          infraResult: $[ dependencies.DeployInfra_${{ replace(parameters.appName, '-', '_') }}_prod.result ]
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none
          - bash: |
              RESULT="$(infraResult)"
              echo "dependsOn job: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_prod"
              echo "DeployInfra result: '$RESULT'"
              if [ -z "$RESULT" ]; then
                echo "##vso[task.logissue type=warning]Runtime expression returned blank — Azure DevOps could not resolve dependencies context for template-included job. Check DeployInfra job status directly in the pipeline UI."
              elif [ "$RESULT" == "Succeeded" ]; then
                echo "DeployInfra succeeded. App deploy should proceed."
              else
                echo "##vso[task.logissue type=warning]DeployInfra result is '$RESULT' (not Succeeded). App deploy job uses default succeeded() condition and will be skipped."
              fi
            displayName: 'Print dependency gate status'

      - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'consumption')) }}:
        - template: ../jobs/app-deploy-function.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'prod'
            serviceConnection: ${{ parameters.prodServiceConnection }}
            functionAppName: ${{ parameters.prodAppResourceName }}
            resourceGroup: ${{ parameters.prodResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_prod

      - ${{ if and(eq(parameters.appType, 'function'), eq(parameters.planType, 'flex-consumption')) }}:
        - template: ../jobs/app-deploy-function-flex.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'prod'
            serviceConnection: ${{ parameters.prodServiceConnection }}
            functionAppName: ${{ parameters.prodAppResourceName }}
            resourceGroup: ${{ parameters.prodResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_prod

      - ${{ if eq(parameters.appType, 'appservice') }}:
        - template: ../jobs/app-deploy-webapp.yml
          parameters:
            appName: ${{ parameters.appName }}
            environment: 'prod'
            serviceConnection: ${{ parameters.prodServiceConnection }}
            webAppName: ${{ parameters.prodAppResourceName }}
            resourceGroup: ${{ parameters.prodResourceGroup }}
            dependsOn: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_prod
