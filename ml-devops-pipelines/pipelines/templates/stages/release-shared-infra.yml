# Release Template — Shared Infrastructure
#
# Deploys shared resources (VNet, shared storage, etc.) through environments.
# Shared infra Bicep lives in THIS repo under shared/ — no app-repo checkout needed.
#
# Flow: Validate → Deploy QA (auto) → What-If UAT → Approve+Deploy UAT
#       → What-If Prod → Approve+Deploy Prod

parameters:
  - name: bicepFile
    type: string
    default: 'shared/main.bicep'

  # QA
  - name: qaServiceConnection
    type: string
  - name: qaResourceGroup
    type: string
  - name: qaParamFile
    type: string
    default: 'shared/params/qa.bicepparam'

  # UAT
  - name: uatServiceConnection
    type: string
  - name: uatResourceGroup
    type: string
  - name: uatParamFile
    type: string
    default: 'shared/params/uat.bicepparam'

  # Prod
  - name: prodServiceConnection
    type: string
  - name: prodResourceGroup
    type: string
  - name: prodParamFile
    type: string
    default: 'shared/params/prod.bicepparam'

  # ─── Key Vault secret seeding ───
  - name: qaKeyVaultName
    type: string
    default: ''
  - name: qaStorageAccountName
    type: string
    default: ''
  - name: qaAppInsightsName
    type: string
    default: ''
  - name: qaAppInsightsResourceGroup
    type: string
    default: ''
  - name: externalSecrets
    type: object
    default: []

stages:
  # ──────────────────────────────────────────
  # Stage 1: Validate
  # ──────────────────────────────────────────
  - stage: Validate
    displayName: 'Validate Shared Infra'
    jobs:
      - template: ../jobs/bicep-validate.yml
        parameters:
          appName: 'shared-infra'
          serviceConnection: ${{ parameters.qaServiceConnection }}
          resourceGroup: ${{ parameters.qaResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.qaParamFile }}
          checkoutApp: false

  # ──────────────────────────────────────────
  # Stage 2: Deploy to QA (auto)
  # ──────────────────────────────────────────
  - stage: DeployQA
    displayName: 'Deploy QA — Shared Infra'
    dependsOn: Validate
    jobs:
      - template: ../jobs/bicep-deploy.yml
        parameters:
          appName: 'shared-infra'
          environment: 'qa'
          serviceConnection: ${{ parameters.qaServiceConnection }}
          resourceGroup: ${{ parameters.qaResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.qaParamFile }}
          checkoutApp: false

  # ──────────────────────────────────────────
  # Stage 2b: Seed Key Vault secrets (QA)
  # ──────────────────────────────────────────
  - ${{ if ne(parameters.qaKeyVaultName, '') }}:
    - stage: SeedSecretsQA
      displayName: 'Seed KV Secrets — QA'
      dependsOn: DeployQA
      jobs:
        - template: ../jobs/seed-keyvault-secrets.yml
          parameters:
            environment: 'qa'
            serviceConnection: ${{ parameters.qaServiceConnection }}
            keyVaultName: ${{ parameters.qaKeyVaultName }}
            storageAccountName: ${{ parameters.qaStorageAccountName }}
            appInsightsName: ${{ parameters.qaAppInsightsName }}
            appInsightsResourceGroup: ${{ parameters.qaAppInsightsResourceGroup }}
            externalSecrets: ${{ parameters.externalSecrets }}

  # ──────────────────────────────────────────
  # Stage 3: What-If UAT
  # ──────────────────────────────────────────
  - stage: WhatIfUAT
    displayName: 'What-If UAT — Shared Infra'
    dependsOn:
      - DeployQA
      - ${{ if ne(parameters.qaKeyVaultName, '') }}:
        - SeedSecretsQA
    jobs:
      - template: ../jobs/bicep-what-if.yml
        parameters:
          appName: 'shared-infra'
          environment: 'uat'
          serviceConnection: ${{ parameters.uatServiceConnection }}
          resourceGroup: ${{ parameters.uatResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.uatParamFile }}
          checkoutApp: false

  # ──────────────────────────────────────────
  # Stage 4: Deploy to UAT (manual approval)
  # ──────────────────────────────────────────
  - stage: DeployUAT
    displayName: 'Deploy UAT — Shared Infra'
    dependsOn: WhatIfUAT
    jobs:
      - deployment: ApproveUAT
        displayName: 'Approve UAT Deployment'
        environment: 'UAT'
        strategy:
          runOnce:
            deploy:
              steps:
                - bash: echo "UAT shared infra deployment approved."

      - template: ../jobs/bicep-deploy.yml
        parameters:
          appName: 'shared-infra'
          environment: 'uat'
          serviceConnection: ${{ parameters.uatServiceConnection }}
          resourceGroup: ${{ parameters.uatResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.uatParamFile }}
          checkoutApp: false

  # ──────────────────────────────────────────
  # Stage 5: What-If Prod
  # ──────────────────────────────────────────
  - stage: WhatIfProd
    displayName: 'What-If Prod — Shared Infra'
    dependsOn: DeployUAT
    jobs:
      - template: ../jobs/bicep-what-if.yml
        parameters:
          appName: 'shared-infra'
          environment: 'prod'
          serviceConnection: ${{ parameters.prodServiceConnection }}
          resourceGroup: ${{ parameters.prodResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.prodParamFile }}
          checkoutApp: false

  # ──────────────────────────────────────────
  # Stage 6: Deploy to Prod (manual approval)
  # ──────────────────────────────────────────
  - stage: DeployProd
    displayName: 'Deploy Prod — Shared Infra'
    dependsOn: WhatIfProd
    jobs:
      - deployment: ApproveProd
        displayName: 'Approve Prod Deployment'
        environment: 'Prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - bash: echo "Production shared infra deployment approved."

      - template: ../jobs/bicep-deploy.yml
        parameters:
          appName: 'shared-infra'
          environment: 'prod'
          serviceConnection: ${{ parameters.prodServiceConnection }}
          resourceGroup: ${{ parameters.prodResourceGroup }}
          bicepFile: ${{ parameters.bicepFile }}
          paramFile: ${{ parameters.prodParamFile }}
          checkoutApp: false
