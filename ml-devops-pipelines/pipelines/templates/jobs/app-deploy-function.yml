parameters:
  - name: appName
    type: string
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: functionAppName
    type: string
  - name: resourceGroup
    type: string
  - name: healthCheckPath
    type: string
    default: ''
  - name: dependsOn
    type: string
    default: ''

jobs:
  - job: DeployApp_${{ replace(parameters.appName, '-', '_') }}_${{ parameters.environment }}
    displayName: 'Deploy App — ${{ parameters.appName }} (${{ parameters.environment }})'
    ${{ if ne(parameters.dependsOn, '') }}:
      dependsOn: ${{ parameters.dependsOn }}
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      - download: ci-build
        displayName: 'Download Pipeline Artifact'
        artifact: drop

      - task: AzureFunctionApp@2
        displayName: 'Deploy to Function App (${{ parameters.environment }})'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          appType: 'functionAppLinux'
          appName: ${{ parameters.functionAppName }}
          package: '$(Pipeline.Workspace)/ci-build/drop/*.zip'
          deploymentMethod: 'zipDeploy'

      - ${{ if ne(parameters.healthCheckPath, '') }}:
        - template: ../steps/health-check.yml
          parameters:
            appUrl: 'https://${{ parameters.functionAppName }}.azurewebsites.net'
            healthPath: ${{ parameters.healthCheckPath }}
