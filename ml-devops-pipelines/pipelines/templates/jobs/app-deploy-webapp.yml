# App Deploy Template — Web App (App Service Linux)
#
# Mirrors app-deploy-function.yml. Differences:
#   - `az webapp deploy` instead of `az functionapp deploy`
#   - Post-deploy HTTP smoke check (warning-only) — verifies the SPA serves a 200
#     before declaring success, with retries to absorb cold-start latency

parameters:
  - name: appName
    type: string
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: webAppName
    type: string
  - name: resourceGroup
    type: string
  - name: dependsOn
    type: string
    default: ''

jobs:
  - job: DeployApp_${{ replace(parameters.appName, '-', '_') }}_${{ parameters.environment }}
    displayName: 'Deploy App — ${{ parameters.appName }} (${{ parameters.environment }})'
    ${{ if ne(parameters.dependsOn, '') }}:
      dependsOn: ${{ parameters.dependsOn }}
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      - download: ci-build
        displayName: 'Download Pipeline Artifact'
        artifact: drop

      - bash: |
          set -e
          echo "=== Downloaded artifact contents ==="
          find "$(Pipeline.Workspace)/ci-build/drop" -type f
          PACKAGE=$(find "$(Pipeline.Workspace)/ci-build/drop" -name "*.zip" | head -1)
          if [ -z "$PACKAGE" ]; then
            echo "##vso[task.logissue type=error]No zip file found in artifact"
            exit 1
          fi
          echo "Package: $PACKAGE"
          echo "##vso[task.setvariable variable=packagePath]$PACKAGE"
        displayName: 'Verify artifact download'

      - task: AzureCLI@2
        displayName: 'Deploy to Web App (${{ parameters.environment }})'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e

            echo "=== Verify Web App exists ==="
            az webapp show \
              --name ${{ parameters.webAppName }} \
              --resource-group ${{ parameters.resourceGroup }} \
              --query "{name:name, state:state, sku:sku, kind:kind}" -o table

            echo ""
            echo "=== Deploying $(packagePath) ==="
            az webapp deploy \
              --resource-group ${{ parameters.resourceGroup }} \
              --name ${{ parameters.webAppName }} \
              --src-path "$(packagePath)" \
              --type zip \
              --clean true \
              --restart true \
              --verbose

            echo ""
            echo "=== Verify deployment ==="
            STATE=$(az webapp show \
              --name ${{ parameters.webAppName }} \
              --resource-group ${{ parameters.resourceGroup }} \
              --query "state" -o tsv)
            echo "Web App state: $STATE"

            if [ "$STATE" != "Running" ]; then
              echo "##vso[task.logissue type=warning]Web App is not in Running state: $STATE"
            fi

            HOSTNAME=$(az webapp show \
              --name ${{ parameters.webAppName }} \
              --resource-group ${{ parameters.resourceGroup }} \
              --query "defaultHostName" -o tsv)
            echo "##vso[task.setvariable variable=webAppHostName]$HOSTNAME"
            echo "Web App hostname: $HOSTNAME"

            echo "Deployment completed successfully."

      - bash: |
          set +e
          URL="https://$(webAppHostName)/"
          echo "Smoke test: GET $URL (5 retries, 15s apart)"

          MAX_ATTEMPTS=5
          SLEEP_SECONDS=15
          STATUS=0
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i/$MAX_ATTEMPTS — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed."
              exit 0
            fi
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              sleep $SLEEP_SECONDS
            fi
          done
          echo "##vso[task.logissue type=warning]Smoke test failed after $MAX_ATTEMPTS attempts — last status: $STATUS. App may still be cold-starting; verify manually."
        displayName: 'Smoke Test (warning-only)'
