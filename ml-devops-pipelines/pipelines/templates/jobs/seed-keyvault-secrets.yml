# Seed Key Vault Secrets
#
# Seeds secrets from Azure DevOps Variable Groups into Key Vault.
# Runs as part of the shared infra pipeline AFTER Key Vault is deployed.
# Idempotent — updates existing secrets, creates new ones.
#
# The externalSecrets parameter maps VG variable names to KV secret names:
#   - name: 'kv-secret-name'              (hyphens — KV requirement)
#     value: $(VG_VARIABLE_NAME)           (any format — comes from Variable Group)
#
# Requirements:
#   - Variable Group linked in the pipeline wrapper
#   - KV secret names must use lowercase + hyphens only (no underscores)
#   - Service connection needs "Key Vault Secrets Officer" role on the KV

parameters:
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: keyVaultName
    type: string
  # Each entry: { name: 'kv-secret-name', value: '$(VG_VARIABLE_NAME)' }
  - name: externalSecrets
    type: object
    default: []

jobs:
  - job: SeedSecrets_${{ parameters.environment }}
    displayName: 'Seed KV Secrets — ${{ parameters.environment }}'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      # ─── Seed each secret from Variable Group into Key Vault ───
      - ${{ each secret in parameters.externalSecrets }}:
        - task: AzureCLI@2
          displayName: 'Seed — ${{ secret.name }}'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -e
              az keyvault secret set \
                --vault-name "${{ parameters.keyVaultName }}" \
                --name "${{ secret.name }}" \
                --value "$SECRET_VALUE" \
                --only-show-errors -o none
              echo "Stored: ${{ secret.name }}"
          env:
            SECRET_VALUE: ${{ secret.value }}

      # ─── Verify: list all secrets in Key Vault ───
      - task: AzureCLI@2
        displayName: 'Verify — List secrets in Key Vault'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            echo "============================================"
            echo " Key Vault: ${{ parameters.keyVaultName }}"
            echo "============================================"
            echo ""
            az keyvault secret list \
              --vault-name "${{ parameters.keyVaultName }}" \
              --query "[].{name:name, enabled:attributes.enabled, updated:attributes.updated}" \
              -o table
            echo ""
            COUNT=$(az keyvault secret list \
              --vault-name "${{ parameters.keyVaultName }}" \
              --query "length(@)" -o tsv)
            echo "Total secrets in Key Vault: $COUNT"
