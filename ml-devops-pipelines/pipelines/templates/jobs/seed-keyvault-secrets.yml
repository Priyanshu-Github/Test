# Seed Key Vault Secrets
#
# Populates the shared Key Vault with secrets derived from Azure resources
# (storage connection strings, App Insights keys, etc.) and from
# Azure DevOps Variable Groups (external API keys, credentials).
#
# Runs as part of the shared infra pipeline AFTER Key Vault is deployed.
# Idempotent — updates existing secrets, creates new ones.

parameters:
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: keyVaultName
    type: string
  - name: storageAccountName
    type: string
    default: ''
  - name: appInsightsName
    type: string
    default: ''
  - name: appInsightsResourceGroup
    type: string
    default: ''
  # External secrets from Azure DevOps Variable Groups.
  # Each entry: { name: 'secret-name-in-kv', value: '$(variableGroupVar)' }
  - name: externalSecrets
    type: object
    default: []

jobs:
  - job: SeedSecrets_${{ parameters.environment }}
    displayName: 'Seed KV Secrets — ${{ parameters.environment }}'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      # ─── Derivable: Storage connection string ───
      - ${{ if ne(parameters.storageAccountName, '') }}:
        - task: AzureCLI@2
          displayName: 'Seed — storage-connection-string'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -e
              CONN_STR=$(az storage account show-connection-string \
                --name "${{ parameters.storageAccountName }}" \
                --query "connectionString" -o tsv)

              az keyvault secret set \
                --vault-name "${{ parameters.keyVaultName }}" \
                --name "storage-connection-string" \
                --value "$CONN_STR" \
                --only-show-errors -o none

              echo "Stored: storage-connection-string"

      # ─── Derivable: App Insights connection string ───
      - ${{ if ne(parameters.appInsightsName, '') }}:
        - task: AzureCLI@2
          displayName: 'Seed — app-insights-connection-string'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -e
              CONN_STR=$(az monitor app-insights component show \
                --app "${{ parameters.appInsightsName }}" \
                --resource-group "${{ parameters.appInsightsResourceGroup }}" \
                --query "connectionString" -o tsv)

              az keyvault secret set \
                --vault-name "${{ parameters.keyVaultName }}" \
                --name "app-insights-connection-string" \
                --value "$CONN_STR" \
                --only-show-errors -o none

              echo "Stored: app-insights-connection-string"

      # ─── External secrets from Variable Groups ───
      - ${{ each secret in parameters.externalSecrets }}:
        - task: AzureCLI@2
          displayName: 'Seed — ${{ secret.name }}'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -e
              az keyvault secret set \
                --vault-name "${{ parameters.keyVaultName }}" \
                --name "${{ secret.name }}" \
                --value "${{ secret.value }}" \
                --only-show-errors -o none

              echo "Stored: ${{ secret.name }}"

      - bash: echo "Key Vault secret seeding complete for ${{ parameters.environment }}."
        displayName: 'Seed complete'
