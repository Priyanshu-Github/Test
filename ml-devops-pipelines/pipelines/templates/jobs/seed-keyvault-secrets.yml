parameters:
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: keyVaultName
    type: string
  # Each entry: { name: 'kv-secret-name', value: '$(VG_VARIABLE_NAME)' }
  - name: externalSecrets
    type: object
    default: []

jobs:
  - job: SeedSecrets_${{ parameters.environment }}
    displayName: 'Seed KV Secrets - ${{ parameters.environment }}'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      - ${{ each secret in parameters.externalSecrets }}:
        - task: AzureCLI@2
          displayName: 'Seed and verify - ${{ secret.name }}'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -eo pipefail

              SECRET_NAME='${{ secret.name }}'
              RAW_MAPPING='${{ secret.value }}'

              echo "--------------------------------------------"
              echo "Debug: secret name           : ${SECRET_NAME}"
              echo "Debug: raw mapping token     : ${RAW_MAPPING}"

              MAPPED_VAR=""
              if [[ "$RAW_MAPPING" =~ ^\$\(([A-Za-z0-9._-]+)\)$ ]]; then
                MAPPED_VAR="${BASH_REMATCH[1]}"
                echo "Debug: mapped variable name  : ${MAPPED_VAR}"
              else
                echo "Debug: mapped variable name  : <not macro syntax>"
              fi

              if [ -z "${SECRET_VALUE+x}" ]; then
                echo "Debug: env SECRET_VALUE      : NOT SET"
              else
                echo "Debug: env SECRET_VALUE      : SET"
              fi

              # If env injection is skipped, use the raw token and validate.
              if [ -z "${SECRET_VALUE+x}" ] || [ -z "${SECRET_VALUE}" ]; then
                SECRET_VALUE="$RAW_MAPPING"
                echo "Debug: value source          : RAW_MAPPING"
              else
                echo "Debug: value source          : ENV"
              fi

              # Dev-only deep debug (prints resolved value as requested).
              echo "Debug: resolved value plain  : ${SECRET_VALUE}"

              if [ -n "$MAPPED_VAR" ] && [[ "$MAPPED_VAR" == *-* ]]; then
                echo "##vso[task.logissue type=warning]Mapped variable name '${MAPPED_VAR}' contains hyphen. Azure DevOps variable names should use underscores."
              fi

              if [ -z "$SECRET_VALUE" ]; then
                echo "##vso[task.logissue type=error]Value of secret '${SECRET_NAME}' is empty after mapping."
                exit 1
              fi
              if [[ "$SECRET_VALUE" =~ ^\$\(.+\)$ ]]; then
                echo "##vso[task.logissue type=error]Value of secret '${SECRET_NAME}' is not set. Unresolved macro: ${SECRET_VALUE}"
                exit 1
              fi
              echo "Debug: value length          : ${#SECRET_VALUE}"

              echo "Setting secret '${SECRET_NAME}' in the key vault '${{ parameters.keyVaultName }}'"
              az keyvault secret set \
                --vault-name "${{ parameters.keyVaultName }}" \
                --name "$SECRET_NAME" \
                --value "$SECRET_VALUE" \
                --only-show-errors \
                --output none
              SECRET_ID="$(az keyvault secret show \
                --vault-name "${{ parameters.keyVaultName }}" \
                --name "$SECRET_NAME" \
                --query "id" \
                --output tsv)"
              if [ -z "$SECRET_ID" ]; then
                echo "##vso[task.logissue type=error]Secret not found after set: ${SECRET_NAME}"
                exit 1
              fi
              echo "Stored and verified: ${SECRET_NAME}"
          env:
            SECRET_VALUE: ${{ secret.value }}

      - task: AzureCLI@2
        displayName: 'Verify - List secrets in Key Vault'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -euo pipefail
            echo "============================================"
            echo " Key Vault: ${{ parameters.keyVaultName }}"
            echo "============================================"
            echo ""
            az keyvault secret list \
              --vault-name "${{ parameters.keyVaultName }}" \
              --query "[].{name:name, enabled:attributes.enabled, updated:attributes.updated}" \
              --output table
            echo ""
            COUNT=$(az keyvault secret list \
              --vault-name "${{ parameters.keyVaultName }}" \
              --query "length(@)" \
              --output tsv)
            echo "Total secrets in Key Vault: $COUNT"
