parameters:
  - name: appName
    type: string
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: resourceGroup
    type: string
  - name: bicepFile
    type: string
  - name: paramFile
    type: string
  - name: checkoutApp
    type: boolean
    default: true
  - name: enableDebug
    type: boolean
    default: false

jobs:
  - job: DeployInfra_${{ replace(parameters.appName, '-', '_') }}_${{ parameters.environment }}
    displayName: 'Deploy Infra — ${{ parameters.appName }} (${{ parameters.environment }})'
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      buildId: $(Build.BuildId)
    steps:
      - checkout: self
      - ${{ if parameters.checkoutApp }}:
        - checkout: app-repo

      - ${{ if parameters.enableDebug }}:
        - task: AzureCLI@2
          displayName: 'Debug — Verify parameters and dependencies'
          inputs:
            azureSubscription: ${{ parameters.serviceConnection }}
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              set -e
              echo "=== Param file contents ==="
              cat ${{ parameters.paramFile }}
              echo ""
              echo "=== App Service Plans in ${{ parameters.resourceGroup }} ==="
              az appservice plan list \
                --resource-group ${{ parameters.resourceGroup }} \
                --query "[].{name:name, id:id, sku:sku.name}" -o table
              echo ""
              echo "=== Storage Accounts in ${{ parameters.resourceGroup }} ==="
              az storage account list \
                --resource-group ${{ parameters.resourceGroup }} \
                --query "[].{name:name, id:id}" -o table

      - task: AzureCLI@2
        displayName: 'Restore Bicep Modules'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az bicep restore --file ${{ parameters.bicepFile }}

      - task: AzureCLI@2
        displayName: 'Deploy Bicep to ${{ parameters.environment }}'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            az deployment group create \
              --resource-group ${{ parameters.resourceGroup }} \
              --template-file ${{ parameters.bicepFile }} \
              --parameters ${{ parameters.paramFile }} \
              --name "${{ parameters.appName }}-$(buildId)" \
              --verbose
        name: deployBicep

      - task: AzureCLI@2
        displayName: 'Capture Deployment Outputs'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            set -e
            OUTPUTS=$(az deployment group show \
              --resource-group ${{ parameters.resourceGroup }} \
              --name "${{ parameters.appName }}-$(buildId)" \
              --query properties.outputs -o json)
            echo "##vso[task.setvariable variable=deploymentOutputs;isOutput=true]$OUTPUTS"
        name: outputs
