parameters:
  - name: appName
    type: string
  - name: environment
    type: string
  - name: serviceConnection
    type: string
  - name: appServiceName
    type: string
  - name: resourceGroup
    type: string
  - name: artifactFeedName
    type: string
  - name: artifactName
    type: string
  - name: artifactVersion
    type: string
  - name: healthCheckPath
    type: string
    default: ''
  - name: dependsOn
    type: string
    default: ''

jobs:
  - job: DeployApp_${{ replace(parameters.appName, '-', '_') }}_${{ parameters.environment }}
    displayName: 'Deploy App — ${{ parameters.appName }} (${{ parameters.environment }})'
    ${{ if ne(parameters.dependsOn, '') }}:
      dependsOn: ${{ parameters.dependsOn }}
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: none

      - template: ../steps/download-artifact.yml
        parameters:
          artifactFeedName: ${{ parameters.artifactFeedName }}
          artifactName: ${{ parameters.artifactName }}
          artifactVersion: ${{ parameters.artifactVersion }}

      - task: AzureCLI@2
        displayName: 'Deploy to App Service'
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            PACKAGE=$(find $(Pipeline.Workspace)/artifact -name "*.zip" | head -1)
            echo "Deploying package: $PACKAGE"
            az webapp deploy \
              --resource-group ${{ parameters.resourceGroup }} \
              --name ${{ parameters.appServiceName }} \
              --src-path "$PACKAGE" \
              --type zip \
              --verbose

      - ${{ if ne(parameters.healthCheckPath, '') }}:
        - template: ../steps/health-check.yml
          parameters:
            appUrl: 'https://${{ parameters.appServiceName }}.azurewebsites.net'
            healthPath: ${{ parameters.healthCheckPath }}
