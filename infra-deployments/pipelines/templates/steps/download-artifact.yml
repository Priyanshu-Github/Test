parameters:
  - name: artifactFeedName
    type: string
  - name: artifactName
    type: string
  - name: artifactVersion
    type: string
  - name: downloadPath
    type: string
    default: '$(Pipeline.Workspace)/artifact'

steps:
  - task: UniversalPackages@0
    displayName: 'Download Artifact — ${{ parameters.artifactName }}@${{ parameters.artifactVersion }}'
    inputs:
      command: 'download'
      feedsToUse: 'internal'
      vstsFeed: ${{ parameters.artifactFeedName }}
      vstsFeedPackage: ${{ parameters.artifactName }}
      vstsPackageVersion: ${{ parameters.artifactVersion }}
      downloadDirectory: ${{ parameters.downloadPath }}
