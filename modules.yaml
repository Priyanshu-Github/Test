trigger:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/modules/**
      - scripts/**
      - pipelines/**
      - modules.yaml
      - config/registry.json

pr:
  branches:
    include:
      - main
  paths:
    include:
      - bicep/modules/**
      - scripts/**
      - pipelines/**
      - modules.yaml
      - config/registry.json

pool:
  vmImage: ubuntu-latest

variables:
  - group: bicep-registry-vars

stages:
  - stage: Detect
    displayName: Detect changed module versions
    jobs:
      - job: ScanModules
        displayName: Run version governance and detection
        steps:
          - checkout: self
            fetchDepth: 0

          - bash: |
              set -euo pipefail
              config="config/registry.json"
              acr_name="$(jq -r '.registryName' "$config")"
              echo "##vso[task.setvariable variable=acrName;isOutput=true]$acr_name"
              echo "ACR resolved from config: $acr_name"
            name: loadConfig
            displayName: Load registry config

          - task: AzureCLI@2
            name: versionGuard
            displayName: Detect modules to validate and publish
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: scripts/version-guard.sh
              arguments: 'bicep/modules $(loadConfig.acrName)'
            env:
              TARGET_BRANCH: $(System.PullRequest.TargetBranch)

  - stage: Validate
    displayName: Lint and build detected modules
    dependsOn: Detect
    condition: and(succeeded(), eq(dependencies.Detect.outputs['ScanModules.versionGuard.hasChanges'], 'true'))
    variables:
      changedModules: $[ stageDependencies.Detect.ScanModules.outputs['versionGuard.changedModules'] ]
    jobs:
      - job: ValidateModules
        displayName: Validate modules selected by version guard
        steps:
          - checkout: self
            fetchDepth: 1

          - template: pipelines/templates/validate-modules.yaml
            parameters:
              changedModules: $(changedModules)
              azureServiceConnection: $(azureServiceConnection)

  - stage: Publish
    displayName: Publish detected module versions
    dependsOn:
      - Detect
      - Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(dependencies.Detect.outputs['ScanModules.versionGuard.hasChanges'], 'true'))
    variables:
      changedModules: $[ stageDependencies.Detect.ScanModules.outputs['versionGuard.changedModules'] ]
      acrName: $[ stageDependencies.Detect.ScanModules.outputs['loadConfig.acrName'] ]
    jobs:
      - job: PublishModules
        displayName: Publish modules selected by version guard
        steps:
          - checkout: self
            fetchDepth: 1

          - template: pipelines/templates/publish-modules.yaml
            parameters:
              changedModules: $(changedModules)
              acrName: $(acrName)
              azureServiceConnection: $(azureServiceConnection)
